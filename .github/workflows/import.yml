name: Import Sources

on:
  schedule:
    # Run on the 1st of every month at midnight UTC
    - cron: '0 0 1 * *'
  workflow_dispatch:
    inputs:
      source:
        description: 'Which source to import'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - autoeq
          - oratory
      dry_run:
        description: 'Dry run (show changes without writing)'
        required: false
        default: false
        type: boolean

jobs:
  import:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full

      - name: Set up Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Download Oratory CSV
        id: oratory_csv
        if: github.event.inputs.source != 'autoeq'
        env:
          ORATORY_CSV_URL: ${{ secrets.ORATORY_CSV_URL }}
        run: |
          if [ -z "$ORATORY_CSV_URL" ]; then
            echo "::warning::ORATORY_CSV_URL secret not set, skipping oratory import"
            echo "oratory_csv_available=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          # Convert Dropbox share link to direct download (dl=0 -> dl=1)
          DIRECT_URL="${ORATORY_CSV_URL/dl=0/dl=1}"
          curl -fsSL -o /tmp/oratory.csv "$DIRECT_URL"
          echo "oratory_csv_available=true" >> $GITHUB_OUTPUT
          echo "Downloaded oratory CSV ($(wc -l < /tmp/oratory.csv) lines)"

      - name: Determine import flags
        id: flags
        env:
          SOURCE: ${{ github.event.inputs.source }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          ORATORY_CSV_AVAILABLE: ${{ steps.oratory_csv.outputs.oratory_csv_available }}
        run: |
          FLAGS=""

          if [ "$SOURCE" = "autoeq" ]; then
            FLAGS="--autoeq-only"
          elif [ "$SOURCE" = "oratory" ]; then
            FLAGS="--oratory-only"
          fi

          # Add oratory CSV path if available
          if [ "$ORATORY_CSV_AVAILABLE" = "true" ]; then
            FLAGS="$FLAGS --oratory-csv /tmp/oratory.csv"
          elif [ "$SOURCE" != "autoeq" ]; then
            # Oratory CSV not available and not autoeq-only: fall back to autoeq-only
            echo "::warning::Oratory CSV not available, falling back to autoeq-only"
            FLAGS="--autoeq-only"
          fi

          if [ "$DRY_RUN" = "true" ]; then
            FLAGS="$FLAGS --dry-run"
          fi

          echo "flags=$FLAGS" >> $GITHUB_OUTPUT
          echo "is_dry_run=$DRY_RUN" >> $GITHUB_OUTPUT

      - name: Run import
        id: import
        env:
          OPRA_CACHE_DIR: ${{ github.workspace }}
        run: |
          set +e  # Don't exit on error
          deno run --allow-all tools/import.ts ${{ steps.flags.outputs.flags }} --output-json > import-summary.json 2>&1
          EXIT_CODE=$?
          set -e

          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

          if [ -f import-summary.json ]; then
            cat import-summary.json
          else
            echo '{"error": "Import failed to produce summary"}' > import-summary.json
          fi

          # Fail the step if import had errors (but continue workflow for PR creation)
          if [ $EXIT_CODE -ne 0 ]; then
            echo "::warning::Import completed with errors (exit code $EXIT_CODE)"
          fi

      - name: Check for changes
        id: changes
        env:
          IS_DRY_RUN: ${{ steps.flags.outputs.is_dry_run }}
        if: env.IS_DRY_RUN != 'true'
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          DATE=$(date +%Y-%m-%d)
          BRANCH="import/${DATE}"

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add .
          git commit -m "Import EQ sources ${DATE}"
          git push origin "$BRANCH"

          # Create PR with summary from import
          if [ -f import-summary.json ] && jq -e . import-summary.json > /dev/null 2>&1; then
            SUMMARY=$(jq -r --arg server_url "$GITHUB_SERVER_URL" --arg repo "$GITHUB_REPOSITORY" --arg run_id "$GITHUB_RUN_ID" '
              "## Import Summary\n\n" +
              "### AutoEQ\n" +
              "- New vendors: \(.autoeq.newVendors // 0)\n" +
              "- New products: \(.autoeq.newProducts // 0)\n" +
              "- New EQs: \(.autoeq.newEqs // 0)\n" +
              "- Updated EQs: \(.autoeq.updatedEqs // 0)\n" +
              "- Unchanged EQs: \(.autoeq.unchangedEqs // 0)\n" +
              (if (.autoeq.errors // 0) > 0 then "- ⚠️ Errors: \(.autoeq.errors)\n" else "" end) +
              "\n### Oratory\n" +
              "- New vendors: \(.oratory.newVendors // 0)\n" +
              "- New products: \(.oratory.newProducts // 0)\n" +
              "- New EQs: \(.oratory.newEqs // 0)\n" +
              "- Updated EQs: \(.oratory.updatedEqs // 0)\n" +
              "- Unchanged EQs: \(.oratory.unchangedEqs // 0)\n" +
              (if (.oratory.errors // 0) > 0 then "- ⚠️ Errors: \(.oratory.errors)\n" else "" end) +
              (
                if (.unknownTypes | length) > 0 then
                  "\n---\n\n### ⚠️ Products Needing Subtype Classification\n\n" +
                  "**\(.unknownTypes | length) products** were imported with `subtype: unknown` and need manual classification.\n\n" +
                  (if (.unknownTypes | length) <= 20 then
                    (.unknownTypes | map("- `" + . + "`") | join("\n")) + "\n"
                  else
                    (.unknownTypes[0:20] | map("- `" + . + "`") | join("\n")) + "\n- ... and \((.unknownTypes | length) - 20) more\n"
                  end) +
                  "\n<details>\n<summary>ℹ️ Valid subtypes</summary>\n\n" +
                  "Products must have one of:\n" +
                  "- `over_the_ear` - Circumaural (around the ear)\n" +
                  "- `on_ear` - Supra-aural (on the ear)\n" +
                  "- `in_ear` - IEMs (in-ear monitors)\n" +
                  "- `earbuds` - Earbuds (sit in outer ear)\n" +
                  "\n</details>\n"
                else ""
                end
              ) +
              (
                if (.errors | length) > 0 then
                  "\n---\n\n### ❌ Import Errors\n\n" +
                  "**\(.errors | length) files** failed to import:\n\n" +
                  (if (.errors | length) <= 10 then
                    (.errors | map("- **[\(.source)]** `" + (.file | split("/")[-1]) + "`\n  ```\n  " + .message + "\n  ```") | join("\n")) + "\n"
                  else
                    (.errors[0:10] | map("- **[\(.source)]** `" + (.file | split("/")[-1]) + "`\n  ```\n  " + .message + "\n  ```") | join("\n")) + "\n- ... and \((.errors | length) - 10) more errors (see workflow logs)\n"
                  end) +
                  "\n<details>\n<summary>View workflow logs</summary>\n\n" +
                  "[See full import logs](\($server_url)/\($repo)/actions/runs/\($run_id))\n" +
                  "\n</details>\n"
                else ""
                end
              )
            ' import-summary.json)
          else
            SUMMARY="Import completed. See workflow logs for details."
          fi

          gh pr create \
            --title "Import EQ sources ${DATE}" \
            --body "${SUMMARY}" \
            --base main \
            --head "$BRANCH"
